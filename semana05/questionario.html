<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/questionario.css">
</head>
<body>
    <header>
        <h1>Questionário HTML e CSS</h1>
    </header>
    <main>
        <form>
            <label for="q1">1. O que significa a sigla CSS?</label>
            <input type="text" name="q1" id="q1">

            <label for="q2">2. Como os atributos "id" e "class" são selecionados no CSS?</label>
            <textarea name="q2" id="q2" rows="2"></textarea>

            <label for="q3">3. Qual das opções abaixo é um comentário CSS válido?</label>
            <select name="q3" id="q3">
                <option value="" selected disabled>Escolha uma...</option>
                <option value="1">// Comentário</option>
                <option value="2"> /* Comentário */</option>
                <option value="3"> Comentário </option>
            </select>

            <label for="q4">4. Quantos anos de experiência você tem com CSS?</label>
            <input type="number" id="q4" name="q4">

            <button type="submit">Enviar Questionário</button>
        </form>
    </main>
</body>
</html>
