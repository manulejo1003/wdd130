<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/formulario-pesquisa.css">
</head>
<body>
    <header>
        <h1>WWD 130 | Formulário HTML - Enquete do Usuário</h1>
    </header>
    <main>
        <form>
            <fieldset>
                <legend>Informações de Contato</legend>

                <div class="item-formulario coluna2">
                    <label for="nome-completo">Nome Completo:</label>
                    <input type="text" id="nome-completo" name="nome-completo" required>
                </div>

                <div class="item-formulario coluna2">
                    <label for="email-do-usuario">Email:</label>
                    <input type="email" id="email-do-usuario" name="email-do-usuario" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Pesquisa</legend>

                <div class="item-formulario coluna1">
                <label for="navegador">Qual é o seu navegador favorito?</label>
                    <select name="navegador" id="navegador">
                        <option value="1">Chrome</option>
                        <option value="2">Edge</option>
                        <option value="3">Safari</option>
                        <option value="4">Brave</option>
                        <option value="5">Outro</option>
                    </select>
                </div>
            
                <div class="item-formulario coluna1">
                    <label for="pet">Você tem um bichinho de estimação?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="item-formulario">
                    <label for="feedback">Liste lugares que você já morou:</label>
                    <textarea name="feedback" id="feedback" rows="4"
                    placeholder="Stillwater Flórida, Amsterdã Holanda, Tibuktu Mali"></textarea>
                </div>

            </fieldset>
        
            <button type="button">Enviar pesquisa</button>
        </form>
    </main>
    <footer>
        <p>©2026 | Formulário HTML - Atividade de Enquete do Usuário | Manuela Santos</p>
    </footer>
</body>
</html>
